        <meta charset="UTF-8">

        <link rel="stylesheet" href="CSS/cadastro.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

            n.queue=[];t=b.createElement(e);t.async=!0;

    <body>

        <header>
            <div class="logo">
                <img src="IMG/logo-perto-de-ti.svg" alt="Logo Perto de Ti">
            </div>
            <button class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
            <nav aria-label="Menu principal">
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="por_que_nos.html">Por que nós</a></li>
                    <li><a href="servico.html">Serviços</a></li>
                    <li><a href="cadastro.html" class="nav-botao">Conecte-se</a></li>
                </ul>
            </nav>
        </header>

        <section class="cadastro">
            <div class="cadastro-colunas">

                <div class="cadastro-form">
                    <h2>Cadastro</h2>
                    <form id="form-cadastro" novalidate>
                        <div class="campo-form">
                            <input type="text" id="nome" name="nome" placeholder="Nome">
                            <span class="erro" id="erro-nome"></span>
                        </div>

                        <div class="campo-form">
                            <input type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                            <span class="erro" id="erro-sobrenome"></span>
                        </div>

                        <div class="campo-form">
                            <input type="email" id="email" name="email" placeholder="E-mail">
                            <span class="erro" id="erro-email"></span>
                        </div>

                        <div class="campo-form">
                            <label for="localizacao-busca">Localização (opcional)</label>
                            <div class="grupo-pesquisa-mapa">
                                <input type="text" id="localizacao-busca" placeholder="Pesquisar morada, bairro ou município...">
                                <button type="button" id="botao-pesquisar-mapa" aria-label="Pesquisar localização"><i class="fas fa-search"></i></button>
                            </div>
                            <span class="erro" id="erro-localizacao"></span>
                        </div>

                        <input type="hidden" id="latitude" name="latitude">
                        <input type="hidden" id="longitude" name="longitude">

                        <p class="mensagem-sucesso" id="mensagem-sucesso"></p>

                        <button type="submit" class="btn-enviar">Enviar</button>
                    </form>
                </div>

                <div class="cadastro-mapa">
                    <div id="mapa-cadastro"></div>
                    <p class="mapa-instrucao">
                        <i class="fas fa-map-marker-alt"></i>
                        Clica no mapa ou arrasta o marcador para definir a tua localização
                    </p>
                    <p class="mapa-coordenadas" id="mapa-coordenadas"></p>
                </div>

            </div>
        </section>

        <footer class="rodape">
            <p>&copy; 2026 Perto de Ti</p>
            <p> Todos os direitos reservados</p>
        </footer>

        <script src="JS/main.js"></script>
        <script src="JS/mapa.js"></script>
        <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAKKQjZdaMoLw4bC3bcLjnH32DjN-qBva0&callback=inicializarMapaCadastro"></script>
    </body>
</html>
